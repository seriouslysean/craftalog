name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Parse vendored data into generated JSON
        run: npm run parse

      - name: Check committed generated data matches submodule pin
        id: drift
        run: git diff --exit-code -- src/data/generated public/textures

      - name: Explain drift failure
        if: failure() && steps.drift.outcome == 'failure'
        run: |
          echo "::error::src/data/generated and/or public/textures are out of date with the pinned mcmeta submodules."
          echo "Run 'npm run parse' locally after updating vendor/mcmeta-summary and vendor/mcmeta-assets, then commit the regenerated files."

      - name: Validate generated data
        run: npm run validate

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Resolve installed Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: End-to-end smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
