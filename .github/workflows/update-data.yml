name: Update vanilla data

on:
  schedule:
    # Every Monday at 03:17 UTC - a quiet time, off the top of the hour.
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild and capture changes even when pins are already current"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "npm"

      - name: Determine latest stable mcmeta version
        id: latest
        run: |
          latest=$(git ls-remote --tags https://github.com/misode/mcmeta 'refs/tags/*-summary' \
            | sed -E 's#.*refs/tags/##' \
            | grep -E '^[0-9]+(\.[0-9]+)+-summary$' \
            | sed -E 's/-summary$//' \
            | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::Could not determine latest stable mcmeta version from remote tags."
            exit 1
          fi
          echo "version=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest stable version: $latest"

      - name: Compare to current pin
        id: current
        run: |
          current=$(grep -m1 -E '^[0-9]+(\.[0-9]+)+$' vendor/mcmeta-summary/version.txt || true)
          if [ -z "$current" ]; then
            echo "::error::vendor/mcmeta-summary/version.txt does not contain a valid version."
            exit 1
          fi
          echo "version=$current" >> "$GITHUB_OUTPUT"
          echo "Current pinned version: $current"

      - name: Determine latest stable bedrock-samples version
        id: latest-bedrock
        run: |
          latest=$(git ls-remote --tags https://github.com/Mojang/bedrock-samples 'refs/tags/*' \
            | sed -E 's#.*refs/tags/##' \
            | grep -E '^v[0-9]+(\.[0-9]+)+$' \
            | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::Could not determine latest stable bedrock-samples version from remote tags."
            exit 1
          fi
          echo "version=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest stable bedrock-samples version: $latest"

      - name: Compare bedrock-samples to current pin
        id: current-bedrock
        run: |
          # The submodule is a shallow clone (.gitmodules sets shallow=true)
          # that carries no tags, so `git describe` cannot name the pinned
          # commit. Resolve the tag from the remote refs pointing at HEAD
          # instead; the `^{}` suffix handles annotated tags.
          head=$(git -C vendor/bedrock-samples rev-parse HEAD)
          current=$(git ls-remote --tags https://github.com/Mojang/bedrock-samples 'refs/tags/*' \
            | awk -v sha="$head" '$1 == sha { print $2 }' \
            | sed -E 's#^refs/tags/##; s#\^\{\}$##' \
            | grep -E '^v[0-9]+(\.[0-9]+)+$' \
            | sort -V | tail -1)
          if [ -z "$current" ]; then
            echo "::error::Could not resolve the pinned bedrock-samples commit ${head} to a stable release tag."
            exit 1
          fi
          echo "version=$current" >> "$GITHUB_OUTPUT"
          echo "Current pinned bedrock-samples version: $current"

      - name: Determine whether anything needs bumping
        id: needs-bump
        env:
          LATEST: ${{ steps.latest.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST_BEDROCK: ${{ steps.latest-bedrock.outputs.version }}
          CURRENT_BEDROCK: ${{ steps.current-bedrock.outputs.version }}
          FORCE: ${{ inputs.force == true }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Force run: rebuilding regardless of pins (mcmeta ${CURRENT} -> ${LATEST}, bedrock-samples ${CURRENT_BEDROCK} -> ${LATEST_BEDROCK})."
          elif [ "$LATEST" != "$CURRENT" ] || [ "$LATEST_BEDROCK" != "$CURRENT_BEDROCK" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date (mcmeta ${CURRENT}, bedrock-samples ${CURRENT_BEDROCK})."
          fi

      - name: Check for existing update branch
        if: steps.needs-bump.outputs.changed == 'true'
        id: branch-check
        env:
          LATEST: ${{ steps.latest.outputs.version }}
          LATEST_BEDROCK: ${{ steps.latest-bedrock.outputs.version }}
          FORCE: ${{ inputs.force == true }}
          RUN_ID: ${{ github.run_id }}
        run: |
          branch="data-update/mcmeta-${LATEST}_bedrock-${LATEST_BEDROCK}"
          if [ "$FORCE" = "true" ]; then
            # Force runs may target already-current pins, so the version-based
            # name could collide with a previous branch; a run-id suffix keeps
            # each force run unique (delete_branch_on_merge cleans them up).
            branch="${branch}-force-${RUN_ID}"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Branch $branch already exists on origin - a previous data update PR is stalled."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump submodule pins
        if: steps.needs-bump.outputs.changed == 'true' && steps.branch-check.outputs.exists != 'true'
        id: bump
        env:
          VER: ${{ steps.latest.outputs.version }}
          BEDROCK_VER: ${{ steps.latest-bedrock.outputs.version }}
        run: |
          cd vendor/mcmeta-summary
          git fetch --depth 1 origin tag "${VER}-summary"
          git checkout "${VER}-summary"
          cd ../..

          cd vendor/mcmeta-assets
          git fetch --depth 1 origin tag "${VER}-assets"
          git checkout "${VER}-assets"
          cd ../..

          cd vendor/bedrock-samples
          git fetch --depth 1 origin tag "${BEDROCK_VER}"
          git checkout "${BEDROCK_VER}"
          cd ../..

      - name: Install dependencies from lockfile
        if: steps.needs-bump.outputs.changed == 'true' && steps.branch-check.outputs.exists != 'true'
        run: npm ci

      - name: Parse and validate
        if: steps.needs-bump.outputs.changed == 'true' && steps.branch-check.outputs.exists != 'true'
        id: parse-validate
        run: |
          set -o pipefail
          {
            npm run parse
            npm run validate
          } 2>&1 | tee /tmp/update-data.log

      - name: Check for changes
        if: steps.needs-bump.outputs.changed == 'true' && steps.branch-check.outputs.exists != 'true'
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Parse/validate succeeded but produced no changes; clean no-op, nothing to commit or deploy."
          fi

      - name: Commit and open PR
        if: steps.changes.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.latest.outputs.version }}
          BEDROCK_VER: ${{ steps.latest-bedrock.outputs.version }}
          CURRENT_VER: ${{ steps.current.outputs.version }}
          CURRENT_BEDROCK_VER: ${{ steps.current-bedrock.outputs.version }}
          BRANCH: ${{ steps.branch-check.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add vendor/mcmeta-summary vendor/mcmeta-assets vendor/bedrock-samples src/data/generated public/textures
          git commit -m "data: update vanilla data to mcmeta ${VER}, bedrock-samples ${BEDROCK_VER}"
          git push origin "$BRANCH"

          counts=""
          if [ -f src/data/generated/meta.json ]; then
            counts=$(cat src/data/generated/meta.json)
          fi

          # Pretty-print any non-empty audit lists from meta.json's `audit`
          # key (guarded: older parser output has no such key) so curation
          # work surfaces directly on the PR.
          audit_section=""
          if [ -f src/data/generated/meta.json ] \
            && jq -e '.audit' src/data/generated/meta.json >/dev/null 2>&1; then
            queue=$(jq -r '
              .audit | to_entries[]
              | select((.value | type) == "array" and (.value | length) > 0)
              | "**\(.key)** (\(.value | length))\n"
                + (.value | map("- `" + tostring + "`") | join("\n"))
                + "\n"
            ' src/data/generated/meta.json)
            if [ -n "$queue" ]; then
              audit_section=$(printf '## Curation queue\n\n%s' "$queue")
            fi
          fi

          body=$(cat <<EOF
          Bumps vendored mcmeta data from \`${CURRENT_VER}\` to \`${VER}\`,
          and vendored bedrock-samples (bed icons + entity geometry) from
          \`${CURRENT_BEDROCK_VER}\` to \`${BEDROCK_VER}\`.

          Regenerated via \`npm run parse\` and checked with \`npm run validate\`.

          <details>
          <summary>src/data/generated/meta.json</summary>

          \`\`\`json
          ${counts}
          \`\`\`

          </details>

          ${audit_section}

          Opened automatically by the \`update-data\` scheduled workflow,
          which merges it automatically once CI passes and then deploys the
          site. A manual run with the \`force\` input rebuilds and captures
          changes even without a version bump.
          EOF
          )

          pr_url=$(gh pr create \
            --title "data: update vanilla data to mcmeta ${VER}, bedrock-samples ${BEDROCK_VER}" \
            --body "$body" \
            --base main \
            --head "$BRANCH")
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Run CI on the PR branch and wait for it
        if: steps.changes.outputs.changed == 'true'
        id: ci-watch
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch-check.outputs.branch }}
        run: |
          # PRs created with GITHUB_TOKEN do not trigger pull_request
          # workflows, so run CI explicitly; its check runs attach to the
          # head SHA and satisfy the PR's required `ci` check.
          gh workflow run ci.yml --ref "$BRANCH"

          # The dispatched run does not exist immediately; poll for it. The
          # branch was created by this run, so the first workflow_dispatch
          # CI run on it is necessarily ours.
          run_id=""
          for _ in $(seq 1 24); do
            sleep 5
            run_id=$(gh run list --workflow ci.yml --branch "$BRANCH" \
              --event workflow_dispatch --limit 1 \
              --json databaseId --jq '.[0].databaseId // empty')
            if [ -n "$run_id" ]; then
              break
            fi
          done
          if [ -z "$run_id" ]; then
            echo "::error::Dispatched CI run for ${BRANCH} never appeared."
            exit 1
          fi

          echo "Watching CI run ${run_id} on ${BRANCH}"
          gh run watch "$run_id" --interval 15 --exit-status

      - name: Merge the PR
        if: steps.changes.outputs.changed == 'true'
        id: merge
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch-check.outputs.branch }}
        run: |
          # The required `ci` status check is green on the head SHA and no
          # reviews are required, so a direct squash merge is permitted.
          # delete_branch_on_merge cleans up the branch.
          gh pr merge "$BRANCH" --squash

      - name: Run CI on main to trigger deploy
        if: steps.changes.outputs.changed == 'true'
        id: deploy-kick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The squash-merge push above was authored by GITHUB_TOKEN, and
          # events created with GITHUB_TOKEN do not create workflow runs -
          # so ci.yml's push trigger will NOT fire for that merge commit,
          # and deploy.yml (workflow_run on CI@main) would never run.
          # workflow_dispatch is exempt from that suppression, so dispatch
          # CI on main explicitly; its success fires the deploy workflow.
          gh workflow run ci.yml --ref main

      - name: Report failure or stalled PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
          STALLED: ${{ steps.branch-check.outputs.exists }}
          TAGS_FAILED: ${{ steps.latest.outcome == 'failure' || steps.latest-bedrock.outcome == 'failure' }}
          PINS_FAILED: ${{ steps.current.outcome == 'failure' || steps.current-bedrock.outcome == 'failure' }}
          BUMP_OUTCOME: ${{ steps.bump.outcome }}
          PARSE_OUTCOME: ${{ steps.parse-validate.outcome }}
          CI_OUTCOME: ${{ steps.ci-watch.outcome }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          BRANCH: ${{ steps.branch-check.outputs.branch }}
          PR_URL: ${{ steps.pr.outputs.url }}
          VER: ${{ steps.latest.outputs.version }}
          BEDROCK_VER: ${{ steps.latest-bedrock.outputs.version }}
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cause=""
          detail=""

          if [ "$TAGS_FAILED" = "true" ]; then
            cause="resolving the latest stable upstream tag failed (git ls-remote against misode/mcmeta or Mojang/bedrock-samples)"
          elif [ "$PINS_FAILED" = "true" ]; then
            cause="parsing the currently pinned versions failed (version.txt or the bedrock-samples HEAD-to-tag resolution)"
          elif [ "$BUMP_OUTCOME" = "failure" ]; then
            cause="checking out the bumped submodule tags failed"
          elif [ "$PARSE_OUTCOME" = "failure" ]; then
            cause="\`npm run parse\` / \`npm run validate\` failed"
            tail_log=$(tail -n 200 /tmp/update-data.log 2>/dev/null || echo "no log captured")
            detail=$(printf "<details>\n<summary>Log tail</summary>\n\n\`\`\`\n%s\n\`\`\`\n\n</details>" "$tail_log")
          elif [ "$CI_OUTCOME" = "failure" ]; then
            cause="CI failed on the data PR (${PR_URL:-branch \`${BRANCH}\`}); the PR was left open, unmerged"
          elif [ "$MERGE_OUTCOME" = "failure" ]; then
            cause="merging the data PR (${PR_URL:-branch \`${BRANCH}\`}) was rejected"
          elif [ "$JOB_STATUS" = "failure" ]; then
            cause="an unexpected step failed (see the run log)"
          elif [ "$STALLED" = "true" ]; then
            pr_url=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // empty' || true)
            cause="a previous data update PR (${pr_url:-branch \`${BRANCH}\`}) is still open, so this run skipped itself; merge or close it to unblock weekly updates"
          fi

          if [ -z "$cause" ]; then
            echo "Nothing to report."
            exit 0
          fi

          title="Scheduled vanilla data update needs attention"
          body=$(cat <<EOF
          Automated vanilla data update (mcmeta \`${VER:-unknown}\`, bedrock-samples
          \`${BEDROCK_VER:-unknown}\`) needs attention.

          Cause: ${cause}.

          ${detail}

          Run: ${run_url}
          EOF
          )
          existing=$(gh issue list --state open \
            --search "\"$title\" in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
            echo "Commented on existing open issue #$existing instead of creating a duplicate."
          else
            gh issue create --title "$title" --body "$body"
          fi
